g:0;margin:0;cursor:pointer;display:block}.video-placeholder img{width:100%;height:100%;object-fit:cover;display:block}.video-play-overlay{position:absolute;inset:0;display:flex;justify-content:center;align-items:center;background:#00000059;transition:background .2s ease}.video-placeholder:hover .video-play-overlay{background:#0000008c}.video-play-overlay span{color:#fff;font-size:3rem;text-shadow:0 0 16px rgba(0,0,0,.8)}.video-container iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}.table-container{overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:800px}th,td{padding:16px;border-bottom:1px solid var(--border);text-align:left}.btn{padding:10px 20px;background:var(--primary);color:#fff;text-decoration:none;border-radius:6px;font-weight:700;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .2s;min-width:160px;justify-content:center;margin-bottom:5px}.btn:hover:not(:disabled){filter:brightness(1.2);transform:translateY(-1px)}.btn:disabled{background:#334155;cursor:not-allowed;opacity:.6}.btn-secondary{background:#334155;min-width:auto}pre{background:#000;padding:18px;border-radius:8px;border:1px solid var(--border);position:relative}code{color:var(--success);font-family:Consolas,monospace;font-size:.95rem}footer{text-align:center;padding:60px 20px;color:var(--muted);border-top:1px solid var(--border)}
</style></head> <body data-theme="dark"> <header> <div class="topbar"> <div> <h1 style="margin:0">DogPE10_x64</h1> <p style="margin:5px 0 0 0; color:var(--muted)">
WinPE by <strong>Dog Expert Tech</strong> </p> </div> <button type="button" class="btn btn-secondary" onclick="toggleTheme()">🌓 Theme</button> </div> </header> <main> <section class="card"> <h2>Demonstrations</h2> <div id="videoGrid" class="video-grid"></div> </section> <section class="card"> <h2>Available Images</h2> <div class="table-container"> <table> <thead> <tr> <th>Status</th> <th>Version</th> <th>Size</th> <th>Stats</th> <th>Action</th> <th>Verify</th> </tr> </thead> <tbody id="isoTable"></tbody> </table> </div> </section> <section class="card" id="checksumCard" style="display:none"> <div style="display: flex; justify-content: space-between; align-items: center;"> <h2 style="margin:0">SHA256 Integrity Hash</h2> <button type="button" class="btn btn-secondary" onclick="copyHash()">Copy</button> </div> <pre style="margin-top:15px"><code id="checksumValue"></code></pre> </section> </main> <footer>&copy; 2026 Dog Expert Tech</footer> <script>
      sessionStorage.clear();

      async function loadPortal() {
        try {
          const response = await fetch('/Dog10PE/isos.json');
          const data = await response.json();

          const tbody = document.getElementById('isoTable');
          tbody.innerHTML = '';

          data.isos.forEach((iso, isoIndex) => {
            const isOnline = iso.status.toLowerCase() === 'online';

            let actionButtons = '';
            if (isOnline && iso.links) {
              iso.links.forEach((link, linkIndex) => {
                const btnId = `dl-btn-${isoIndex}-${linkIndex}`;
                actionButtons += `
                  <button class="btn"
                          id="${btnId}"
                          onclick="handleDownload('${link.url}', '${btnId}', ${isOnline})">
                    ${link.name} Download
                  </button><br>`;
              });
            } else {
              actionButtons = `<button class="btn" disabled>Offline</button>`;
            }

            const row = document.createElement('tr');
            row.innerHTML = `
              <td>
                <span class="badge ${isOnline ? 'status-online' : 'status-offline'}">
                  <span class="dot"></span> ${iso.status}
                </span>
              </td>
              <td><strong>${iso.version}</strong><br><small>${iso.arch}</small></td>
              <td>${iso.size}</td>
              <td><span style="color:var(--muted)">📊 ${iso.downloads.toLocaleString()}</span></td>
              <td>${actionButtons}</td>
              <td><button class="btn btn-secondary" onclick='showHash("${iso.sha256}")'>Verify</button></td>
            `;
            tbody.appendChild(row);
          });

          const vGrid = document.getElementById('videoGrid');
          data.videos.forEach((vid) => {
            const div = document.createElement('div');
            div.className = 'video-card';
            div.innerHTML = `
              <h4 style="margin:0 0 10px 0">${vid.title}</h4>
              <div class="video-container">
                <button type="button" class="video-placeholder" data-src="https://www.youtube.com/embed/${vid.id}" aria-label="Load video: ${vid.title}">
                  <img src="https://img.youtube.com/vi/${vid.id}/hqdefault.jpg" alt="${vid.title} thumbnail" loading="lazy" />
                  <div class="video-play-overlay"><span>▶</span></div>
                </button>
              </div>
            `;
            vGrid.appendChild(div);
          });

          vGrid.addEventListener('click', (event) => {
            const placeholder = event.target.closest('.video-placeholder');
            if (!placeholder) return;

            const iframe = document.createElement('iframe');
            iframe.src = placeholder.dataset.src;
            iframe.title = placeholder.getAttribute('aria-label') || 'YouTube video';
            iframe.loading = 'lazy';
            iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
            iframe.allowFullscreen = true;
            iframe.style.width = '100%';
            iframe.style.height = '100%';

            placeholder.replaceWith(iframe);
          });
        } catch (e) {
          console.error('Failed to load Dog10PE data:', e);
        }
      }

      function handleDownload(url, btnId, isOnline) {
        if (!isOnline) return;

        const btn = document.getElementById(btnId);
        const isUnlocked = sessionStorage.getItem('dogpe_unlocked');

        if (isUnlocked === 'true') {
          window.open(url, '_blank');
          return;
        }

        let timeLeft = 20;
        const originalText = btn.innerText;
        btn.disabled = true;

        const timer = setInterval(() => {
          btn.innerText = `Preparing: ${timeLeft}s`;
          timeLeft--;

          if (timeLeft < 0) {
            clearInterval(timer);
            btn.innerText = originalText;
            btn.disabled = false;
            sessionStorage.setItem('dogpe_unlocked', 'true');
            window.open(url, '_blank');
          }
        }, 1000);
      }

      function showHash(hash) {
        const card = document.getElementById('checksumCard');
        card.style.display = 'block';
        document.getElementById('checksumValue').innerText = hash;
        card.scrollIntoView({ behavior: 'smooth' });
      }

      function copyHash() {
        const hash = document.getElementById('checksumValue').innerText;
        navigator.clipboard.writeText(hash);
        alert('Hash copied!');
      }

      function toggleTheme() {
        document.body.dataset.theme =
          document.body.dataset.theme === 'dark' ? 'light' : 'dark';
      }

      loadPortal();
    </script> </body> </html>

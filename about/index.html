  <style>
    .social-media {
      padding: 40px 20px;
      background: #121212;
      color: #fff;
      text-align: center;
    }
    .social-media h2 {
      font-size: 2em;
      margin-bottom: 30px;
      font-weight: 700;
    }
    .social-links {
      display: flex;
      justify-content: center;
      gap: 50px;
      flex-wrap: wrap;
    }
    .icon-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: #fff;
      background: #222;
      padding: 20px;
      border-radius: 15px;
      width: 180px;
      height: 180px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 0 10px rgba(255,255,255,0.1);
    }
    .icon-link:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px #ff0000;
    }
    .icon-link img {
      max-width: 120px;
      max-height: 120px;
      margin-bottom: 15px;
      border-radius: 50%;
      background: #000;
      padding: 10px;
      object-fit: contain;
    }

    /* Gallery Style */
    #lightgallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 15px;
      margin-top: 20px;
      margin-bottom: 40px;
    }
    #lightgallery a {
      display: block;
      overflow: hidden;
      border-radius: 10px;
      border: 2px solid #333;
      transition: border-color 0.3s;
      text-decoration: none;
    }
    #lightgallery a:hover {
      border-color: #ff0000;
    }
    #lightgallery img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }
    #lightgallery a:hover img {
      transform: scale(1.05);
    }

    /* Technical Specs Style */
    .specs-list {
      margin-top: 40px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }
    .specs-list h2 {
      border-bottom: 2px solid #ff0000;
      display: inline-block;
      margin-bottom: 15px;
    }
    .specs-list p {
        margin: 10px 0;
        line-height: 1.6;
    }
  </style>
</head>

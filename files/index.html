<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Files - Dog Expert Tech</title>
  <link rel="icon" type="image/x-icon" href="/assets/favicon.jpg">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #121212;
      color: #fff;
    }
    main {
      padding: 40px 20px;
      text-align: center;
      max-width: 1000px;
      margin: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
    }
    th, td {
      padding: 15px;
      border-bottom: 1px solid #333;
      text-align: left;
    }
    th {
      background: #222;
      color: #ff0000;
    }
    tr:hover {
      background: #252525;
    }
    .social-media {
      padding: 40px 20px;
      text-align: center;
    }
    .social-links {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .icon-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: #fff;
      background: #222;
      padding: 20px;
      border-radius: 15px;
      width: 150px;
      transition: all 0.3s ease;
    }
    .icon-link:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px #ff0000;
    }
    .icon-link img {
      width: 80px;
      height: 80px;
      margin-bottom: 15px;
      border-radius: 50%;
    }
    /* Dark Mode reeglid */
    body.dark { background-color: #121212; color: #fff; }
    body.dark .navbar { background: #1a1a1a; }
  </style>
</head>

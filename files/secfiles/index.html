<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Expert Second Files</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/x-icon" href="/assets/favicon.jpg">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #121212;
      color: #fff;
    }
    h1 {
      text-align: center;
      margin-top: 40px;
    }
    table {
      width: 90%;
      max-width: 1000px;
      margin: 40px auto;
      border-collapse: collapse;
      background: #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
    }
    th, td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid #333;
    }
    th {
      background: #222;
      color: #ff0000;
    }
    tr:hover {
      background: #252525;
    }
    .social-media {
      padding: 40px 20px;
      text-align: center;
    }
    .social-links {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }
    .icon-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: #fff;
      background: #222;
      padding: 20px;
      border-radius: 15px;
      width: 150px;
      transition: all 0.3s ease;
    }
    .icon-link:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px #ff0000;
    }
    .icon-link img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin-bottom: 15px;
      background: #000;
      padding: 5px;
    }
    #google_translate_element {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="nav-left">Dog Expert Tech</div>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/about">About</a></li>
        <li><a href="/files">Files</a></li>
        <li><a href="/software">Software</a></li>
        <li><a href="/gallery">Gallery</a></li>
        <li><a href="/contact">Contact</a></li>
        <li><a href="/blog">Blog</a></li>
      </ul>
      <button id="theme-toggle">🌙</button>
    </nav>
  </header>

  <main>
    <h1>Expert Second Files</h1>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Type</th>
          <th>Size (MB)</th>
          <th>Download</th>
        </tr>
      </thead>
      <tbody id="file-list">
        </tbody>
    </table>
  </main>

  <section class="social-media">
    <h2>Join my channels</h2>
    <div class="social-links">
      <a href="/go/youtube/" target="_blank" class="icon-link">
        <img src="/assets/expertyoutube.jpg" alt="YouTube" />
        <span>Dog Expert</span>
      </a>
      <a href="/go/youtubeextra/" target="_blank" class="icon-link">
        <img src="/assets/expertextrayoutube.jpg" alt="YouTube Extra" />
        <span>Expert Extra</span>
      </a>
      <a href="/go/discord/" target="_blank" class="icon-link">
        <img src="/assets/discord.png" alt="Discord" />
        <span>Discord Server</span>
      </a>
    </div>
  </section>

  <div id="google_translate_element"></div>

  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,et,ru',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE
      }, 'google_translate_element');
    }
  </script>
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  <script src="script.js"></script>
</body>
</html>

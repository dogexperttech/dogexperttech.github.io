name: Auto update videos, RSS and sitemap

on:
  schedule:
    - cron: '0 2 * * *' # daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      channel_id:
        description: 'YouTube Channel ID (optional). If omitted, use repository variable.'
        required: false

jobs:
  update-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch YouTube videos
        env:
          YT_CHANNEL_ID: ${{ github.event.inputs.channel_id || vars.YT_CHANNEL_ID }}
        run: |
          if [ -z "$YT_CHANNEL_ID" ]; then
            echo "Error: No channel id provided via workflow_dispatch input or repository variable 'YT_CHANNEL_ID'."
            exit 1
          fi
          node scripts/fetch-youtube-videos.js

      - name: Generate per-video pages
        run: |
          node scripts/generate-video-pages.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: auto-update videos and pages (auto)"
          git push
